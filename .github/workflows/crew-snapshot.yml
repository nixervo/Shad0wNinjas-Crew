name: Crew Snapshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: crew-snapshot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 4320
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install openpyxl

      - run: python crew_snapshot.py
